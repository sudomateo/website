---
name: Build and Push Container

on:
  push:
    branches:
      - main

jobs:
  hugo-mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Builder Stage
        uses: docker/build-push-action@v6
        with:
          file: Containerfile
          target: builder
          load: true
          tags: website-builder

      - name: Run hugo mod tidy
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/app
          -w /app
          website-builder
          hugo mod tidy

      - name: Check for diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::hugo mod tidy produced changes. Please run 'hugo mod tidy' and commit the result."
            exit 1
          fi

  container-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Container Image Tag
        id: image_tag
        run: |
          ref=${GITHUB_REF##*/}
          sha=${GITHUB_SHA::8}
          timestamp=$(date +%s)
          echo "::set-output name=image_tag::${ref}-${sha}-${timestamp}"  

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Container
        uses: docker/build-push-action@v6
        with:
          file: Containerfile
          push: true
          tags: |
            ghcr.io/sudomateo/website:latest
            ghcr.io/sudomateo/website:${{ github.sha }}
            ghcr.io/sudomateo/website:${{ steps.image_tag.outputs.image_tag }}
          platforms: |
            linux/amd64
            linux/arm64
